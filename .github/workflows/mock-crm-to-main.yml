name: Mock CRM to website main

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/mock-crm.json"
      - "scripts/mock_crm_store.py"
      - "scripts/sync_from_mock_crm.py"
      - "scripts/validate_ai_summary.py"

permissions:
  contents: write
  actions: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: mock-crm-refresh-main
  cancel-in-progress: false

jobs:
  refresh-website-data:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[routine]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      HAS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate public snapshot from mock CRM
        run: python3 scripts/sync_from_mock_crm.py

      - name: Validate CRM-derived snapshot
        run: python3 scripts/sync_from_mock_crm.py --check

      - name: Generate AI website copy with Claude Code
        if: env.HAS_ANTHROPIC_API_KEY == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are updating a professional mock CRM-to-website demo.

            The source CRM data has already been synchronized into site/data/pipeline.json.
            That file is the validated source of truth for every number.
            Write site/data/ai-summary.json only.

            Hard rules:
            - Do not edit data/mock-crm.json.
            - Do not edit site/data/pipeline.json.
            - Do not edit site/data/audit-log.json.
            - Do not change any numeric facts.
            - Every claim in the copy must be traceable to source keys from pipeline.json.
            - Keep the copy concise and executive-dashboard friendly.

            The output file must be JSON with:
            - metadata.generatedBy = "claude-code-action"
            - metadata.sourceFile = "site/data/pipeline.json"
            - metadata.sourceSha256 copied exactly from pipeline.metadata.sourceSha256
            - metadata.dataAsOf copied exactly from pipeline.metadata.dataAsOf
            - hero.headline, hero.body, hero.sources
            - cards array with 3-4 objects, each with title, body, and sources

            Make the lead copy explicitly say whether closed-won sales are ahead of or behind the goal by using:
            - metrics.closedWon
            - metrics.closedWonGoal
            - metrics.closedWonDelta
            - metrics.closedWonAttainment
          claude_args: |
            --max-turns 6
            --allowedTools Read,Write,Edit

      - name: Generate demo AI copy without external API
        if: env.HAS_ANTHROPIC_API_KEY != 'true'
        run: python3 scripts/simulate_ai_summary.py --mode github-actions-local-fallback

      - name: Validate AI-authored summary
        run: python3 scripts/validate_ai_summary.py

      - name: Commit generated website files to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh website from mock CRM"
          branch: main
          file_pattern: site/data/pipeline.json site/data/audit-log.json site/data/ai-summary.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
