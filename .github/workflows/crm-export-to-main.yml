name: CRM export to website main

on:
  workflow_dispatch:
    inputs:
      export_path:
        description: "Path to the CRM export workbook"
        default: "data/crm-export-june-2026.xlsx"
        required: true
  push:
    branches:
      - main
    paths:
      - "data/**/*.xlsx"

permissions:
  contents: write
  actions: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: crm-export-refresh-main
  cancel-in-progress: false

jobs:
  refresh-website-data:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[routine]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      HAS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve export path
        id: export
        shell: bash
        run: |
          export_path="${{ github.event.inputs.export_path }}"
          if [ -z "$export_path" ]; then
            export_path="$(find data -type f -name '*.xlsx' | sort | tail -n 1)"
          fi
          if [ -z "$export_path" ]; then
            echo "No CRM export workbook found." >&2
            exit 1
          fi
          echo "path=$export_path" >> "$GITHUB_OUTPUT"

      - name: Generate CRM-derived website data
        run: python3 scripts/ingest_crm_export.py "${{ steps.export.outputs.path }}"

      - name: Validate CRM-derived data
        run: python3 scripts/ingest_crm_export.py "${{ steps.export.outputs.path }}" --check

      - name: Generate AI website copy with Claude Code
        if: env.HAS_ANTHROPIC_API_KEY == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are updating a sanitized CRM-to-website demo after a CRM export refresh.

            Read site/data/pipeline.json. This is the validated source of truth for all numbers.
            Write site/data/ai-summary.json only.

            Hard rules:
            - Do not edit site/data/pipeline.json.
            - Do not edit site/data/audit-log.json.
            - Do not edit the Excel workbook.
            - Do not change any numeric facts.
            - Every claim in the copy must be traceable to source keys from pipeline.json.
            - Keep the copy concise and dashboard-friendly.

            The output file must be JSON with:
            - metadata.generatedBy = "claude-code-action"
            - metadata.sourceFile = "site/data/pipeline.json"
            - metadata.sourceSha256 copied exactly from pipeline.metadata.sourceSha256
            - metadata.dataAsOf copied exactly from pipeline.metadata.dataAsOf
            - hero.headline, hero.body, hero.sources
            - cards array with 3-4 objects, each with title, body, and sources

            Make the lead copy explicitly say whether closed-won sales are ahead of or behind the goal by using:
            - metrics.closedWon
            - metrics.closedWonGoal
            - metrics.closedWonDelta
            - metrics.closedWonAttainment
          claude_args: |
            --max-turns 6
            --allowedTools Read,Write,Edit

      - name: Generate demo AI copy without external API
        if: env.HAS_ANTHROPIC_API_KEY != 'true'
        run: python3 scripts/simulate_ai_summary.py --mode github-actions-local-fallback

      - name: Validate AI-authored summary
        run: python3 scripts/validate_ai_summary.py

      - name: Commit generated website files to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh website data and AI copy from CRM export"
          branch: main
          file_pattern: site/data/pipeline.json site/data/audit-log.json site/data/ai-summary.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
